<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Veloce positioning Venn diagram</title>
  <desc id="desc">A three-circle Venn diagram showing Tech-agnostic, Customisable, and Provider-agnostic as overlapping capabilities.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <circle cx="280" cy="180" r="118" fill="#1f8a70" fill-opacity="0.45"/>
  <circle cx="440" cy="180" r="118" fill="#2a6fdb" fill-opacity="0.45"/>
  <circle cx="360" cy="285" r="118" fill="#ffb703" fill-opacity="0.45"/>
  <circle cx="280" cy="180" r="118" fill="none" stroke="#155e4f" stroke-width="4"/>
  <circle cx="440" cy="180" r="118" fill="none" stroke="#1f4fbf" stroke-width="4"/>
  <circle cx="360" cy="285" r="118" fill="none" stroke="#c47f00" stroke-width="4"/>
  <text x="220" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#0f172a">Tech-agnostic</text>
  <text x="500" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#0f172a">Provider-agnostic</text>
  <text x="360" y="385" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#0f172a">Customisable</text>
  <text x="360" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#0f172a">Veloce</text>
</svg>
